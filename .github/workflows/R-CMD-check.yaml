# Runs R CMD check and the torch-free test suite on every push / PR.
# The neural (torch) tests skip themselves when libtorch is absent, so the
# check job stays fast; the test-torch job installs libtorch (cached between
# runs) and exercises the full neural suite (MDN, MAF).
name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

  test-torch:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      TORCH_HOME: /home/runner/.cache/torch
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, any::torch

      - name: Cache libtorch
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/torch
          key: libtorch-${{ runner.os }}-r-torch

      - name: Install libtorch
        # torch 0.17 refuses a TORCH_HOME that does not exist yet, so create it
        # before asking for the install.
        run: |
          mkdir -p "$TORCH_HOME"
          Rscript -e 'if (!torch::torch_is_installed()) torch::install_torch()'

      - name: Install package and run full test suite
        run: |
          R CMD INSTALL --no-docs .
          cd tests && Rscript testthat.R
